 0%,100%{transform:translate(0,0) scale(1)}

function setTanggalJatuhTempo(){
  const now = new Date();
  const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  const tahun = nextMonth.getFullYear();
  const bulan = String(nextMonth.getMonth() + 1).padStart(2,'0');

  });
}

function formatWA(input) {
  let val = input.value.replace(/[^0-9]/g, '');
  if(val.startsWith('8')) val = '0' + val;
  if(!val.startsWith('08')) val = '08';
  if(val.length > 13) val = val.substring(0, 13);

  let formatted = val;
  if(val.length > 4) formatted = val.slice(0,4) + '-' + val.slice(4);
  if(val.length > 8) formatted = val.slice(0,4) + '-' + val.slice(4,8) + '-' + val.slice(8);
  input.value = formatted;
}

function formatRupiahInput(input) {
  let angka = input.value.replace(/[^0-9]/g, '');
  if(angka === '') {
    input.value = '';
    return;
  }
  input.value = 'Rp. ' + parseInt(angka).toLocaleString('id-ID');
}

function formatRupiahFull(angka){
  return 'Rp. ' + Number(angka).toLocaleString('id-ID');
}

async function uploadFoto(file, prefix){
  const ext = file.name.split('.').pop().toLowerCase();
  const timestamp = Date.now();
  const fileName = `${prefix}_${timestamp}.${ext}`;

  const {data, error} = await supabaseClient.storage.from('ktp').upload(fileName, file, {
    cacheControl: '3600',
    upsert: false
  });
  if(error) throw new Error('Upload gagal: ' + error.message);

  const {data: urlData} = supabaseClient.storage.from('ktp').getPublicUrl(fileName);
  return urlData.publicUrl;
}

    let total = jmlBersih + bunga;
    let waBersih = '62' + waInput.replace(/[^0-9]/g, '').replace(/^0/, '');

    status.innerText = '⏳ Simpan data ke database...';
    const {error} = await supabaseClient.from('pinjaman').insert([{
      nama_lengkap: nama,

      foto_ktp_url: fotoKtpUrl,
      foto_selfie_url: fotoSelfieUrl,
      jumlah_pinjaman: jmlBersih,
      bunga: bunga,
      jumlah_bayar: total,
      tanggal_jatuh_tempo: jatuhTempo,
      status: 'aktif'
    }]);

    if(error) throw error;

    status.style.color = '#FFD700';
    status.innerText = '✅ Pengajuan berhasil disimpan!';

    setTimeout(()=>{
      document.getElementById('formPengajuan').reset();
      hitung();
      setTanggalJatuhTempo();
      status.innerText = '';
    }, 2500);

  } catch(err) {
    status.style.color = '#DC2626';
    status.innerText = '❌ ' + err.message;
    console.error(err);
  }

  btn.disabled = false;
  btn.innerText = 'Kirim Pengajuan';
});

async function loadData(){
  const {data, error} = await supabaseClient.from('pinjaman').select('*').order('created_at', {ascending:false});
  if(error){ alert('Gagal load data: '+error.message); return; }

  dataPinjaman = data;
  renderTable();
}

function renderTable(){
  const tbody = document.querySelector('#tabelPinjaman tbody');
  if(dataPinjaman.length === 0){
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#FFD700">Belum ada data pinjaman</td></tr>';
    return;
  }

  tbody.innerHTML = '';
  const today = new Date();
  today.setHours(0,0,0,0);

  dataPinjaman.forEach((row)=>{
    const jatuh = new Date(row.tanggal_jatuh_tempo);
    let statusClass = 'status-aktif';
    let statusText = 'Aktif';

    if(row.status === 'lunas'){
      statusClass = 'status-lunas';
      statusText = 'Lunas';
    } else if(jatuh < today){
      statusClass = 'status-telat';
      statusText = 'Telat';
    }

    let waTampil = row.no_tlp_whatsapp.replace(/^62/, '0');
    if(waTampil.length > 4) waTampil = waTampil.slice(0,4) + '-' + waTampil.slice(4);
    if(waTampil.length > 9) waTampil = waTampil.slice(0,9) + '-' + waTampil.slice(9);

    const btnLunas = row.status!== 'lunas'?
      `<button class="btn-lunas" onclick="tandaiLunas(${row.id}, '${row.nama_lengkap.replace(/'/g, "\\'")}')">Lunasin</button>
       <button class="btn-wa-konfirmasi" onclick="kirimWAkonfirmasi('${row.nama_lengkap.replace(/'/g, "\\'")}', '${row.no_tlp_whatsapp}', ${row.jumlah_pinjaman}, ${row.bunga}, ${row.jumlah_bayar}, '${row.tanggal_jatuh_tempo}')">WA Konfirmasi</button>`
      : '-';

    tbody.innerHTML += `
      <tr>
        <td title="${row.nama_lengkap}">${row.nama_lengkap}</td>
        <td title="${waTampil}">${waTampil}</td>
        <td title="${formatRupiahFull(row.jumlah_pinjaman)}">${formatRupiahFull(row.jumlah_pinjaman)}</td>
        <td title="${formatRupiahFull(row.jumlah_bayar)}">${formatRupiahFull(row.jumlah_bayar)}</td>
        <td>${new Date(row.tanggal_jatuh_tempo).toLocaleDateString('id-ID')}</td>
        <td><img class="ktp" src="${row.foto_ktp_url}" onclick="window.open('${row.foto_ktp_url}', '_blank')"></td>
        <td><img class="ktp" src="${row.foto_selfie_url}" onclick="window.open('${row.foto_selfie_url}', '_blank')"></td>
        <td><span class="${statusClass}">${statusText}</span></td>
        <td>${btnLunas}</td>
      </tr>
    `;
  });
}

async function tandaiLunas(id, nama){
  if(!id){
    alert('Error: ID data kosong. Pastikan tabel sudah pakai id bigint IDENTITY');
    return;
  }

  if(!confirm('Yakin tandai LUNAS untuk ' + nama + '?')) return;

  try {
    const {error} = await supabaseClient.from('pinjaman')
.update({status: 'lunas'})
.eq('id', id);

    if(error) {
      alert('❌ Gagal update: ' + error.message);
      return;
    }

    alert('✅ Berhasil! Status ' + nama + ' jadi LUNAS');
    loadData();

  } catch(err) {
    alert('❌ Error: ' + err.message);
  }
}

function exportExcel(){
  if(dataPinjaman.length === 0){ alert('Belum ada data'); return; }

  const dataExport = dataPinjaman.map(row => ({
    'ID': row.id,
    'Nama Lengkap': row.nama_lengkap,
    'Tempat Lahir': row.tempat_lahir,
    'Tanggal Lahir': row.tanggal_lahir,
    'No WA': row.no_tlp_whatsapp.replace(/^62/, '0'),
    'Jumlah Pinjaman': row.jumlah_pinjaman,
    'Bunga 20%': row.bunga,
    'Jumlah Bayar': row.jumlah_bayar,
    'Jatuh Tempo': row.tanggal_jatuh_tempo,
    'Status': row.status,
    'Link KTP': row.foto_ktp_url,
    'Link Selfie KTP': row.foto_selfie_url,
    'Tanggal Input': new Date(row.created_at).toLocaleString('id-ID')
  }));

  const ws = XLSX.utils.json_to_sheet(dataExport);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Data Pinjaman');

  const namaFile = `pinjaman_${new Date().toISOString().split('T')[0]}.xlsx`;
  XLSX.writeFile(wb, namaFile);
}

function kirimWAH1(){
  const besok = new Date();
  besok.setDate(besok.getDate() + 1);
  const besokStr = besok.toISOString().split('T')[0];

  const dataBesok = dataPinjaman.filter(row =>
    row.tanggal_jatuh_tempo === besokStr && row.status === 'aktif'
  );

  if(dataBesok.length === 0){
    alert('Tidak ada yg jatuh tempo besok');
    return;
  }

  let dibuka = 0;
  dataBesok.forEach(row => {
    const pesan = `Halo ${row.nama_lengkap}, reminder: Besok ${new Date(row.tanggal_jatuh_tempo).toLocaleDateString('id-ID')} jatuh tempo pinjaman ${formatRupiahFull(row.jumlah_bayar)}. Terima kasih`;

    const linkWA = `https://wa.me/${row.no_tlp_whatsapp}?text=${encodeURIComponent(pesan)}`;
    window.open(linkWA, '_blank');
    dibuka++;
  });

  alert(`✅ Buka ${dibuka} tab WA. Tinggal pencet "Kirim" manual satu-satu ya ka`);
}

function toggleTabel(){
  const wrapper = document.getElementById('tabelWrapper');
  const btn = document.getElementById('btnToggleTabel');

  wrapper.classList.toggle('hidden');

  if(wrapper.classList.contains('hidden')){
    btn.innerHTML = '🔽 Tampilkan Data Pinjaman';
  } else {
    btn.innerHTML = '🔼 Sembunyikan Data Pinjaman';
  }
}

function logout(){
  currentUser = '';
  document.getElementById('koperasiPage').classList.add('hidden');
  document.getElementById('dashboardPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.body.classList.add('login-active');
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('status').innerText = '';
}
